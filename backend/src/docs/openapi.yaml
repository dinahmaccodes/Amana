openapi: 3.0.0
info:
  title: Amana Backend API
  version: 1.0.0
  description: Backend API for the Amana protocol (Phase 1 endpoints).
servers:
  - url: http://localhost:4000
paths:
  /health:
    get:
      summary: Health check
      description: Returns service status, timestamp, and database connectivity.
      responses:
        "200":
          description: Service is healthy (DB connected or not configured)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok, degraded]
                    example: ok
                  service:
                    type: string
                    example: amana-backend
                  timestamp:
                    type: string
                    format: date-time
                    example: "2026-03-23T12:00:00.000Z"
                  db:
                    type: string
                    enum: [connected, not_configured, disconnected]
                    example: connected
                required:
                  - status
                  - service
                  - timestamp
                  - db
              example:
                status: ok
                service: amana-backend
                timestamp: "2026-03-23T12:00:00.000Z"
                db: connected
        "503":
          description: Service is degraded (DB disconnected)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok, degraded]
                    example: degraded
                  service:
                    type: string
                    example: amana-backend
                  timestamp:
                    type: string
                    format: date-time
                    example: "2026-03-23T12:00:00.000Z"
                  db:
                    type: string
                    enum: [connected, not_configured, disconnected]
                    example: disconnected
                required:
                  - status
                  - service
                  - timestamp
                  - db
              example:
                status: degraded
                service: amana-backend
                timestamp: "2026-03-23T12:00:00.000Z"
                db: disconnected
