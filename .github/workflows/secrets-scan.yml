name: Secrets Scan

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  # Allow manual trigger for full-history scans
  workflow_dispatch:
    inputs:
      full_scan:
        description: "Scan full git history (slow)"
        required: false
        default: "false"

# Only one secrets scan per ref at a time
concurrency:
  group: secrets-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Gitleaks — Secret Detection
    runs-on: ubuntu-latest
    # Required for the PR comment step
    permissions:
      contents: read
      pull-requests: write
      security-events: write

    steps:
      - name: Checkout (full history for PRs and manual full scan)
        uses: actions/checkout@v4
        with:
          fetch-depth: >-
            ${{
              github.event_name == 'pull_request' && '0' ||
              (github.event.inputs.full_scan == 'true' && '0' || '1')
            }}

      # ── Gitleaks scan ────────────────────────────────────────────────────────
      - name: Run Gitleaks
        id: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Enable PR annotation mode
          GITLEAKS_ENABLE_COMMENTS: "true"
        with:
          args: >-
            --config=.gitleaks.toml
            --report-format=sarif
            --report-path=gitleaks-report.sarif
            --exit-code=1
            ${{ github.event_name == 'pull_request' && '--log-opts="--no-merges"' || '' }}

      # ── Upload SARIF for GitHub Security tab ─────────────────────────────────
      - name: Upload SARIF report
        if: always() && hashFiles('gitleaks-report.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks-report.sarif
          category: gitleaks

      # ── Block merge on findings ───────────────────────────────────────────────
      - name: Fail on secrets detected
        if: steps.gitleaks.outcome == 'failure'
        run: |
          echo "::error::Gitleaks detected potential secrets. Review the findings above."
          echo "See docs/secrets-policy.md for remediation steps."
          exit 1

  # ── Pattern-level push protection ────────────────────────────────────────────
  # Fast pre-check using grep on the diff — runs before gitleaks for faster feedback.
  push-protection:
    name: Push Protection — Pattern Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan diff for high-confidence secret patterns
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          DIFF=$(git diff "$BASE_SHA" HEAD -- . \
            ':(exclude)*.md' \
            ':(exclude)*.example' \
            ':(exclude)backend/src/__tests__/**' \
            ':(exclude).gitleaks.toml' \
            2>/dev/null || true)

          FOUND=false

          check_pattern() {
            local label="$1"
            local pattern="$2"
            if echo "$DIFF" | grep -E "^\+" | grep -qE "$pattern"; then
              echo "::error::$label detected in diff. Do not commit real secrets."
              FOUND=true
            fi
          }

          # Stellar secret key
          check_pattern "Stellar secret key" '\bS[A-Z2-7]{55}\b'

          # Ed25519 / RSA private key PEM
          check_pattern "Private key PEM" '-----BEGIN (EC |OPENSSH |RSA )?PRIVATE KEY-----'

          # Postgresql URL with password
          check_pattern "PostgreSQL URL with password" 'postgresql://[^:]+:[^@$\{]{4,}@'

          # JWT token (3-part base64url)
          check_pattern "Hardcoded JWT" 'ey[A-Za-z0-9_-]+\.ey[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+'

          if [[ "$FOUND" == "true" ]]; then
            echo ""
            echo "See docs/secrets-policy.md for remediation steps."
            exit 1
          fi

          echo "✓ No high-confidence secret patterns found in diff."

  # ── Status gate ───────────────────────────────────────────────────────────────
  secrets-scan-gate:
    name: Secrets Scan Gate
    runs-on: ubuntu-latest
    needs: [gitleaks, push-protection]
    if: always()
    steps:
      - name: Check all scan jobs
        run: |
          GITLEAKS="${{ needs.gitleaks.result }}"
          PUSH_PROTECTION="${{ needs.push-protection.result }}"

          # push-protection is skipped on non-PR events — treat skip as pass
          if [[ "$PUSH_PROTECTION" == "skipped" ]]; then
            PUSH_PROTECTION="success"
          fi

          if [[ "$GITLEAKS" != "success" ]] || [[ "$PUSH_PROTECTION" != "success" ]]; then
            echo "::error::Secrets scan gate FAILED. No merge until secrets are removed."
            exit 1
          fi
          echo "✓ All secrets scan checks passed."
