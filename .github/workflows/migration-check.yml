name: Migration Safety Check

on:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "backend/prisma/migrations/**"
      - "backend/prisma/schema.prisma"
      - "backend/prisma/migration_lock.toml"

jobs:
  migration-safety:
    name: Migration Safety Scan
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: amana_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:password@localhost:5432/amana_test

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed for diff

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install deps
        run: npm ci

      # ── 1. Detect new migrations in this PR ─────────────────────────────────
      - name: Detect new migration files
        id: new-migrations
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          NEW_MIGRATIONS=$(git diff --name-only "$BASE_SHA" HEAD -- \
            prisma/migrations/ | grep 'migration\.sql' || true)
          echo "files=$NEW_MIGRATIONS" >> "$GITHUB_OUTPUT"
          if [[ -n "$NEW_MIGRATIONS" ]]; then
            echo "New migration SQL files in this PR:"
            echo "$NEW_MIGRATIONS"
          else
            echo "No new migration SQL files."
          fi

      # ── 2. Scan for destructive DDL ─────────────────────────────────────────
      - name: Scan for destructive DDL
        id: destructive-scan
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          NEW_SQL=$(git diff --name-only "$BASE_SHA" HEAD -- \
            prisma/migrations/ | grep 'migration\.sql' || true)

          DESTRUCTIVE_FOUND=false
          REPORT=""

          PATTERNS=(
            "DROP TABLE"
            "DROP COLUMN"
            "TRUNCATE"
          )

          for f in $NEW_SQL; do
            for pattern in "${PATTERNS[@]}"; do
              if grep -iEq "$pattern" "../$f" 2>/dev/null; then
                MATCH=$(grep -iE "$pattern" "../$f" | head -3)
                REPORT+="⚠ Destructive DDL in $f — $pattern\n$MATCH\n\n"
                DESTRUCTIVE_FOUND=true
              fi
            done
          done

          if [[ "$DESTRUCTIVE_FOUND" == "true" ]]; then
            echo "destructive=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Destructive DDL detected in migration SQL. Review required."
            printf "%b" "$REPORT"
          else
            echo "destructive=false" >> "$GITHUB_OUTPUT"
            echo "No destructive DDL found."
          fi

      # ── 3. Verify migration_lock.toml is consistent ──────────────────────────
      - name: Verify migration lock file
        run: |
          npx prisma migrate status --schema=prisma/schema.prisma 2>&1 || true
          # Ensure the lock file matches the declared provider
          PROVIDER=$(grep 'provider' prisma/migration_lock.toml | head -1)
          echo "Lock file: $PROVIDER"
          if ! echo "$PROVIDER" | grep -q "postgresql"; then
            echo "::error::migration_lock.toml provider mismatch — expected postgresql"
            exit 1
          fi

      # ── 4. Apply migrations to ephemeral test DB ─────────────────────────────
      - name: Apply migrations (dry-run verify)
        run: |
          npx prisma migrate deploy --schema=prisma/schema.prisma
          echo "✓ Migrations applied to test database"

      # ── 5. Verify schema generates a valid Prisma client ─────────────────────
      - name: Generate Prisma client
        run: npx prisma generate --schema=prisma/schema.prisma

      # ── 6. Post summary ──────────────────────────────────────────────────────
      - name: Post PR comment on destructive DDL
        if: steps.destructive-scan.outputs.destructive == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ⚠️ Migration Safety Warning\n\nThis PR contains **destructive DDL** (DROP COLUMN, DROP TABLE, or TRUNCATE).\n\nBefore merging to \`main\`:\n- [ ] Verify the column/table is unused by all application code\n- [ ] Write a companion \`rollback.sql\` file in the migration directory\n- [ ] Test rollback on staging via \`./scripts/migrate-rollback.sh\`\n- [ ] Schedule a maintenance window if applying to production\n\nSee [migration-rollback-playbook.md](docs/migration-rollback-playbook.md) for the full procedure.`
            })

      - name: Fail on destructive DDL to main
        if: >
          steps.destructive-scan.outputs.destructive == 'true' &&
          github.base_ref == 'main'
        run: |
          echo "::error::Destructive DDL in a PR targeting main requires manual review approval."
          echo "Add the 'migration:destructive-approved' label to proceed."
          # Allow merge only if explicitly labelled
          LABELS=$(echo '${{ toJSON(github.event.pull_request.labels) }}' | \
            jq -r '.[].name' 2>/dev/null || true)
          if ! echo "$LABELS" | grep -q "migration:destructive-approved"; then
            exit 1
          fi
